<!DOCTYPE html>
<html>
<head>
    <title>Order Now</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<style>
body {
    background-color: lightgray;
    margin: 0;
    font-family: Arial, sans-serif;
}

header {
    text-align: center;
    padding: 20px 0;
}
nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}
nav a {
    text-decoration: none;
    font-size: 18px;
    padding: 8px 15px;
    border-radius: 5px;
}
nav a:hover {
    background-color: orange;
    color: black;
}

.container {
    width: 400px;         
    margin: 0 auto;     
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.7);
}

input, select, button {
    width: 100%;
    padding: 5px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button {
    background-color: green;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: darkgreen;
}
</style>
<style>
nav a {
    text-decoration:none;
    font-size:18px;
    padding: 8px  15px;
    border-radius: 5px;
}
nav a:hover {
    background-color: orange;
    color: black;
}
</style>
<br>
<header>
    <h1 style="color:darkblue;">Place Your Order</h1>
    <nav>
        <a href="1page.html">Home</a>
        <a href="products.html">Products</a>
        <a href="order.html">Order</a>
    </nav>
</header>
<div class="container">

<form onsubmit="sendWhatsApp(); return false;">
    <label>Name:</label><br>
    <input type="text" id="name" required><br><br>

    <label>Phone:</label><br>
    <input type="text" id="phone" required><br><br>

    <label>Item:</label><br>
    <select id="item">
        <option>Chocolate Cake</option>
        <option>Bread</option>
        <option>Bun</option>
    </select><br><br>

    <label>Quantity:</label><br>
    <input type="number" id="qty" required><br><br>

    <button type="submit">Order via WhatsApp</button>
</form>

</div>

<script>
function sendWhatsApp() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var item = document.getElementById("item").value;
    var qty = document.getElementById("qty").value;

    var message = "Hello, I want to order:\n"
        + "Name: " + name + "\n"
        + "Phone: " + phone + "\n"
        + "Item: " + item + "\n"
        + "Quantity: " + qty;

    var whatsappNumber = "94713185260"; 

    var url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
